<!DOCTYPE html>
<html>
<head>
    <title>API测试</title>
    <meta charset="UTF-8">
</head>
<body>
    <h3>🔌 DeepSeek API 测试工具</h3>
    <div>
        <input type="text" id="apiKey" placeholder="输入你的DeepSeek API密钥" style="width:300px; padding:5px;">
        <button onclick="testAPI()" style="padding:5px 15px;">测试连接</button>
    </div>
    <div id="result" style="margin-top:20px; padding:10px; border:1px solid #ccc; min-height:100px; white-space:pre-wrap;"></div>

    <script>
    async function testAPI() {
        const apiKey = document.getElementById('apiKey').value;
        if (!apiKey) {
            alert('请输入API密钥');
            return;
        }

        document.getElementById('result').innerText = '⏳ 调用中...';
        
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: '你好，请用一句话介绍自己' }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            
            if (response.ok) {
                const content = data.choices[0].message.content;
                document.getElementById('result').innerHTML = 
                    `<span style="color:green;">✅ 连接成功！</span><br><br>${content}`;
            } else {
                document.getElementById('result').innerHTML = 
                    `<span style="color:red;">❌ 失败</span><br>状态码: ${response.status}<br>错误信息: ${JSON.stringify(data)}`;
            }
        } catch (error) {
            document.getElementById('result').innerHTML = 
                `<span style="color:red;">❌ 网络错误</span><br>${error.message}`;
        }
    }
    </script>
</body>
</html>

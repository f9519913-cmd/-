<!DOCTYPE html>
<html>
<head>
    <title>API测试</title>
</head>
<body>
    <h3>DeepSeek API测试</h3>
    <div>
        <input type="text" id="apiKey" placeholder="输入API密钥" style="width:300px">
        <button onclick="testAPI()">测试API</button>
    </div>
    <div id="result" style="margin-top:20px; white-space:pre-wrap;"></div>

    <script>
    async function testAPI() {
        const apiKey = document.getElementById('apiKey').value;
        if (!apiKey) {
            alert('请输入API密钥');
            return;
        }

        document.getElementById('result').innerText = '调用中...';
        
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: '你好，请简单介绍一下自己' }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            
            if (response.ok) {
                const content = data.choices[0].message.content;
                document.getElementById('result').innerHTML = 
                    `<b>✅ 成功！</b><br><br>${content}`;
            } else {
                document.getElementById('result').innerHTML = 
                    `<b>❌ 失败</b><br>状态码: ${response.status}<br>错误: ${JSON.stringify(data)}`;
            }
        } catch (error) {
            document.getElementById('result').innerHTML = 
                `<b>❌ 网络错误</b><br>${error.message}`;
        }
    }
    </script>
</body>
</html>
